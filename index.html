<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkTrack — Quản Lý Giờ Làm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">⏱ WorkTrack</div>
  </nav>

  <div class="container">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="filter-group">
        <label>Tháng</label>
        <select id="filter-month"></select>
        <select id="filter-year"></select>
      </div>
      <div class="toolbar-actions">
        <button class="btn-secondary" onclick="exportCSV()">⬇ Xuất CSV</button>
        <button class="btn-danger-outline" onclick="deleteMonth()">🗑 Xóa tháng</button>
        <button class="btn-primary" onclick="openModal()">＋ Thêm ca</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Số ngày làm</div>
        <div class="stat-value" id="stat-days">0</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-label">Tổng tăng ca tháng</div>
        <div class="stat-value" id="stat-overtime">0h</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Trung bình / ngày</div>
        <div class="stat-value" id="stat-avg">0h</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Ngày</th>
            <th>Giờ vào</th>
            <th>Giờ ra lịch</th>
            <th>Giờ ra thực</th>
            <th>Tăng ca</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>

  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Thêm ca làm việc</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id" />
        <div class="field">
          <label>Ngày làm việc</label>
          <input type="date" id="f-date" />
        </div>
        <div class="field-row">
          <div class="field">
            <label>Giờ vào</label>
            <input type="time" id="f-start" />
          </div>
          <div class="field">
            <label>Giờ ra (lịch)</label>
            <input type="time" id="f-scheduled" />
          </div>
          <div class="field">
            <label>Giờ ra (thực tế)</label>
            <input type="time" id="f-real" />
          </div>
        </div>
        <div class="overtime-preview">
          Tăng ca dự kiến: <strong id="preview-val">0 giờ</strong>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal()">Hủy</button>
        <button class="btn-primary" onclick="saveLog()">Lưu</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
